<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My CDN Website</title>
    <style>
        /* ... ဆရာ့ CSS ... */
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🚀</div>
        <h1>My CDN Website</h1>
        <p>Data Package Example</p>
        
        <div id="data-container">
            <h2>Data from JSON</h2>
            <div id="data-display"></div>
        </div>
        
        <div class="status">● ONLINE</div>
        <div class="info-box">
            <p><span>📌 Server:</span> CDN Domain</p>
            <p><span>🔌 Port:</span> 10001</p>
            <p><span>📁 Version:</span> v2.0.0</p>
            <p><span>🕐 Status:</span> Running</p>
        </div>
        <div class="footer">
            © 2026 My CDN Website. All rights reserved.
        </div>
    </div>

    <script>
        // Load Data from JSON file
        fetch('/data/data.json')
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('data-display');
                container.innerHTML = `
                    <p><strong>Name:</strong> ${data.name}</p>
                    <p><strong>Version:</strong> ${data.version}</p>
                    <hr>
                    <h3>Items:</h3>
                    <ul>
                        ${data.items.map(item => 
                            `<li>${item.name} - $${item.price}</li>`
                        ).join('')}
                    </ul>
                `;
            })
            .catch(error => {
                console.error('Error loading data:', error);
                document.getElementById('data-display').innerHTML = 
                    '<p>Error loading data</p>';
            });

        // Load Data from API (Optional)
        fetch('/api/data')
            .then(response => response.json())
            .then(data => {
                console.log('API Data:', data);
            })
            .catch(error => console.error('API Error:', error));
    </script>
</body>
</html>
