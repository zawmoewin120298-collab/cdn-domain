[build]
  command = "echo 'No build required'"
  publish = "/opt/build/repo"   # ← ဒီလိုပြောင်းပါ

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
